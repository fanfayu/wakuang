plugins {
    id 'fabric-loom' version '1.16.1'
    id 'maven-publish'
}

version = '1.0.0'
group = 'com.example.autominer'

base {
    archivesName = 'autominer'
}

repositories {
    mavenCentral()
    maven { url 'https://maven.fabricmc.net/' }
}

dependencies {
    // Minecraft 1.21.11 官方版本
    minecraft 'com.mojang:minecraft:1.21.11'
    // Yarn 映射 1.21.11 最新版
    mappings 'net.fabricmc:yarn:1.21.11+build.1:v2'
    // Fabric Loader 1.21.11 兼容版
    modImplementation 'net.fabricmc:fabric-loader:0.16.7'

    // Fabric API 1.21.11 最新稳定版
    modImplementation 'net.fabricmc.fabric-api:fabric-api:0.107.0+1.21.11'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.jar {
    from('LICENSE') {
        rename { "${it}_${base.archivesName.get()}" }
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
    repositories {
        mavenLocal()
    }
}
