name: Build 1.21.11 AutoMiner
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21 (1.21.11 强制要求)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: 给 Gradle 脚本授权
        run: chmod +x gradlew
      
      - name: 构建 Mod
        run: ./gradlew build --no-daemon
      
      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: autominer-1.21.11
          path: build/libs/*.jar
          retention-days: 30
